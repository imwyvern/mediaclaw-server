name: Aitoearn Backend Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  APP_NAME: aitoearn-server
  NX_NO_CLOUD: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies and Nx data
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
            .nx/workspace-data
          key: ${{ runner.os }}-node20-aitoearn-server-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-aitoearn-server-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: npx nx build aitoearn-server --skip-nx-cache

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Detect registry configuration
        id: registry
        run: |
          if [ -n "$DOCKER_REGISTRY" ] && [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to registry
        if: steps.registry.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        if: steps.registry.outputs.enabled == 'true'
        run: node scripts/build-docker.mjs "$APP_NAME" --push --registry "$DOCKER_REGISTRY" --platform linux/amd64

      - name: Build Docker image placeholder
        if: steps.registry.outputs.enabled != 'true'
        run: |
          echo "Docker registry credentials are not configured. Running placeholder image build only."
          node scripts/build-docker.mjs "$APP_NAME" --registry placeholder.local --platform linux/amd64

      - name: Detect SSH deployment configuration
        id: ssh
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH access
        if: steps.ssh.outputs.enabled == 'true'
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: SSH deploy placeholder
        if: steps.ssh.outputs.enabled == 'true'
        run: |
          ssh -p "${DEPLOY_SSH_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" "echo 'TODO: replace with production deploy commands for ${APP_NAME} ${GITHUB_REF_NAME}'"

      - name: Missing SSH configuration placeholder
        if: steps.ssh.outputs.enabled != 'true'
        run: |
          echo "SSH deployment secrets are not configured."
          echo "TODO: replace this placeholder with the production deployment command sequence."
