name: Aitoearn Backend Deploy

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

env:
  APP_NAME: aitoearn-server
  DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
  DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
  DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate deployment configuration
        id: config
        run: |
          missing=()

          for key in DOCKER_REGISTRY DOCKER_USERNAME DOCKER_PASSWORD DEPLOY_HOST DEPLOY_PATH DEPLOY_SSH_KEY DEPLOY_USER; do
            if [ -z "${!key}" ]; then
              missing+=("$key")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required deployment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          echo "registry_host=${DOCKER_REGISTRY%%/*}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${DOCKER_REGISTRY}/${APP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.config.outputs.registry_host }}
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.config.outputs.image_repo }}:${{ github.ref_name }}
            ${{ steps.config.outputs.image_repo }}:latest

      - name: Configure SSH access
        run: |
          mkdir -p ~/.ssh
          printf "%s\n" "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: SSH deploy
        env:
          IMAGE_REPO: ${{ steps.config.outputs.image_repo }}
          REGISTRY_HOST: ${{ steps.config.outputs.registry_host }}
        run: |
          ssh -p "${DEPLOY_SSH_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s -- \
            "${DEPLOY_PATH}" \
            "${REGISTRY_HOST}" \
            "${DOCKER_USERNAME}" \
            "${DOCKER_PASSWORD}" \
            "${IMAGE_REPO}" \
            "${GITHUB_REF_NAME}" <<'EOF'
          set -Eeuo pipefail

          DEPLOY_PATH="$1"
          REGISTRY_HOST="$2"
          DOCKER_USERNAME="$3"
          DOCKER_PASSWORD="$4"
          IMAGE_REPO="$5"
          IMAGE_TAG="$6"

          cd "$DEPLOY_PATH"
          printf '%s\n' "$DOCKER_PASSWORD" | docker login "$REGISTRY_HOST" -u "$DOCKER_USERNAME" --password-stdin

          export MEDIACLAW_API_IMAGE="$IMAGE_REPO"
          export MEDIACLAW_WORKER_IMAGE="$IMAGE_REPO"
          export IMAGE_TAG

          docker compose --env-file .env.production -f docker-compose.production.yml pull api worker
          docker compose --env-file .env.production -f docker-compose.production.yml up -d --no-build api worker nginx
          docker compose --env-file .env.production -f docker-compose.production.yml ps
          EOF
