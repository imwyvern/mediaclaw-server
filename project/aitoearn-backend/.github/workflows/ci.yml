name: Aitoearn Backend CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  NX_NO_CLOUD: true
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies and Nx data
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
            .nx/workspace-data
          key: ${{ runner.os }}-node20-aitoearn-server-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-aitoearn-server-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: npx nx lint aitoearn-server --skip-nx-cache

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies and Nx data
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
            .nx/workspace-data
          key: ${{ runner.os }}-node20-aitoearn-server-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-aitoearn-server-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: npx nx build aitoearn-server --skip-nx-cache

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies and Nx data
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
            .nx/workspace-data
          key: ${{ runner.os }}-node20-aitoearn-server-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-aitoearn-server-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect test target
        id: detect-test-target
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const project = JSON.parse(fs.readFileSync('apps/aitoearn-server/project.json', 'utf8'))
          const hasTestTarget = Boolean(project.targets && project.targets.test)
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_test_target=${hasTestTarget}\n`)
          NODE

      - name: Run tests
        if: steps.detect-test-target.outputs.has_test_target == 'true'
        run: npx nx test aitoearn-server --skip-nx-cache

      - name: Skip tests
        if: steps.detect-test-target.outputs.has_test_target != 'true'
        run: echo "No test target configured for aitoearn-server. Skipping tests."

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - lint
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache dependencies and Nx data
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .nx/cache
            .nx/workspace-data
          key: ${{ runner.os }}-node20-aitoearn-server-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node20-aitoearn-server-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: node scripts/build-docker.mjs aitoearn-server --registry ghcr.io/${{ github.repository_owner }} --platform linux/amd64
