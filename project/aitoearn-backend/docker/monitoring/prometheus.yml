global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: node-exporter
    static_configs:
      - targets:
          - host.docker.internal:9100

  - job_name: mediaclaw-app-metrics
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:3002
          - worker:3002

  - job_name: mediaclaw-health-probe
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api:3002/health
          - http://worker:3002/health
          - http://nginx/nginx-health
          - http://rustfs:9000/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
