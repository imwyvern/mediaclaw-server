services:
  api:
    image: ${MEDIACLAW_API_IMAGE:-mediaclaw/aitoearn-api}:${IMAGE_TAG:-latest}
    build:
      context: ./tmp/docker-context/aitoearn-server
      dockerfile: Dockerfile
      args:
        APP_NAME: aitoearn-server
    env_file:
      - .env.production
    environment:
      APP_NAME: aitoearn-server
      NODE_ENV: production
      MEDIACLAW_ENABLE_WORKER: 'false'
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      - sh
      - -lc
      - mkdir -p /var/log/mediaclaw && exec node apps/$${APP_NAME}/src/main.js -c config.js >> /var/log/mediaclaw/api.log 2>&1
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - 127.0.0.1:${API_HOST_PORT:-3002}:3002
    volumes:
      - api-logs:/var/log/mediaclaw
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3002/health || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: ${API_MEM_LIMIT:-1536m}
    cpus: ${API_CPUS:-1.50}
    networks:
      - mediaclaw-net

  worker:
    image: ${MEDIACLAW_WORKER_IMAGE:-mediaclaw/aitoearn-worker}:${IMAGE_TAG:-latest}
    build:
      context: ./tmp/docker-context/aitoearn-server
      dockerfile: Dockerfile
      args:
        APP_NAME: aitoearn-server
    env_file:
      - .env.production
    environment:
      APP_NAME: aitoearn-server
      NODE_ENV: production
      MEDIACLAW_ENABLE_WORKER: 'true'
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command:
      - sh
      - -lc
      - mkdir -p /var/log/mediaclaw && exec node apps/$${APP_NAME}/src/main.js -c config.js >> /var/log/mediaclaw/worker.log 2>&1
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - 127.0.0.1:${WORKER_HOST_PORT:-3003}:3002
    volumes:
      - worker-logs:/var/log/mediaclaw
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:3002/health || exit 1']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s
    mem_limit: ${WORKER_MEM_LIMIT:-1536m}
    cpus: ${WORKER_CPUS:-1.50}
    networks:
      - mediaclaw-net

  mongodb:
    image: mongo:8.0
    env_file:
      - .env.production
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DB_NAME:-aitoearn}
    restart: unless-stopped
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongosh --quiet --username "$${MONGO_INITDB_ROOT_USERNAME}" --password "$${MONGO_INITDB_ROOT_PASSWORD}" --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep -q 1',
        ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: ${MONGODB_MEM_LIMIT:-1024m}
    cpus: ${MONGODB_CPUS:-1.00}
    networks:
      - mediaclaw-net

  redis:
    image: redis:7-alpine
    env_file:
      - .env.production
    command:
      - sh
      - -lc
      - exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$${REDIS_PASSWORD}" ping | grep -q PONG']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: ${REDIS_MEM_LIMIT:-512m}
    cpus: ${REDIS_CPUS:-0.50}
    networks:
      - mediaclaw-net

  rustfs:
    image: rustfs/rustfs:latest
    env_file:
      - .env.production
    environment:
      RUSTFS_VOLUMES: /data/rustfs{0..3}
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ADDRESS: 0.0.0.0:9001
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_CORS_ALLOWED_ORIGINS: '*'
      RUSTFS_CONSOLE_CORS_ALLOWED_ORIGINS: '*'
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_SERVER_DOMAINS: ${RUSTFS_SERVER_DOMAINS:-}
    restart: unless-stopped
    ports:
      - ${RUSTFS_S3_PORT:-9000}:9000
      - ${RUSTFS_CONSOLE_PORT:-9001}:9001
    volumes:
      - rustfs-data:/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://127.0.0.1:9000/health && curl -fsS http://127.0.0.1:9001/rustfs/console/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    mem_limit: ${RUSTFS_MEM_LIMIT:-1024m}
    cpus: ${RUSTFS_CPUS:-1.00}
    networks:
      - mediaclaw-net

  nginx:
    image: nginx:1.29-alpine
    env_file:
      - .env.production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      rustfs:
        condition: service_healthy
    ports:
      - ${NGINX_HTTP_PORT:-80}:80
      - ${NGINX_HTTPS_PORT:-443}:443
    volumes:
      - ./docker/nginx/mediaclaw.production.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx-logs:/var/log/nginx
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O - http://127.0.0.1/nginx-health | grep -q ok']
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: ${NGINX_MEM_LIMIT:-256m}
    cpus: ${NGINX_CPUS:-0.50}
    networks:
      - mediaclaw-net

networks:
  mediaclaw-net:
    name: mediaclaw-net
    driver: bridge

volumes:
  mongodb-data:
  redis-data:
  rustfs-data:
  api-logs:
  worker-logs:
  nginx-logs:
