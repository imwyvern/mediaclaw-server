upstream mediaclaw_api {
    server 127.0.0.1:3002;
}

upstream mediaclaw_web {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name api.mediaclaw.ai;

    # API routes
    location /api/v1/ {
        proxy_pass http://mediaclaw_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (for heartbeat)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for long video processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check
    location /health {
        proxy_pass http://mediaclaw_api/api/v1/health;
    }

    # ShipAny frontend
    location / {
        proxy_pass http://mediaclaw_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
